<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Integrado de Obras — CB Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--surface:#171717;--surface2:#1f1f1f;
  --border:#2a2a2a;--border2:#333;
  --accent:#c8f135;--accent-dim:#a8cc2a;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --danger:#ff5a5a;--warning:#f0a030;
  --jbi-bg:#1a2e1a;--jbi-fg:#6fcf97;
  --jbi2-bg:#1a1a2e;--jbi2-fg:#7f9cf5;
  --radius:6px;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; display:flex; margin:0; }

/* 🔒 TELA DE LOGIN */
.login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
.login-box { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
.input-group { margin-bottom: 15px; text-align: left; }
.input-group label { display: block; color: var(--text2); margin-bottom: 5px; font-size: 14px; }
.input-group input { width: 100%; padding: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); border: 1px solid var(--border); }
.btn-login { background: var(--accent); color: #000; padding: 12px; border: none; width: 100%; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 16px; }

/* 🏢 INTERFACE DO SITE SÓLIDO */
.sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.menu-frentes { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; }
.menu-btn { display: flex; align-items: center; gap: 10px; background: transparent; border: none; color: var(--text2); padding: 10px 12px; text-align: left; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
.menu-btn:hover { background: var(--surface2); color: var(--text); }
.menu-btn.active { background: var(--accent); color: #000; font-weight: 600; }

.main-content { flex: 1; padding: 30px; overflow-y: auto; height: 100vh; }
header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; }

/* 🛠️ ESTILOS INTERNOS DO SEU WEB APP DE EXEMPLO */
.status-bar{display:flex;gap:12px;margin-bottom:24px;font-size:13px;}
.status-pill{background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:var(--radius);display:flex;align-items:center;gap:8px;}
.indicator{width:8px;height:8px;border-radius:50%;background:var(--text3);}
.indicator.online{background:var(--jbi-fg);box-shadow:0 0 8px var(--jbi-fg);}
.indicator.offline{background:var(--danger);box-shadow:0 0 8px var(--danger);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;}
.card-header-actions{display:flex;justify-content:between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.flex-group{display:flex;align-items:center;gap:12px;}

select,input[type="text"],input[type="number"]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:var(--sans);font-size:14px;}
select:focus,input:focus{outline:none;border-color:var(--accent);}

.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-weight:500;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:0.15s;}
.btn:hover{background:var(--border);border-color:var(--text2);}
.btn-primary{background:var(--accent);color:#000;border:none;font-weight:600;}
.btn-primary:hover{background:var(--accent-dim);color:#000;}
.btn-danger{background:#2a1a1a;border-color:#552222;color:var(--danger);}
.btn-danger:hover{background:#442222;}

.grid-quadras{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.quadra-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.quadra-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.condo-badge{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;}
.condo-badge.jbi{background:var(--jbi-bg);color:var(--jbi-fg);}
.condo-badge.jbi2{background:var(--jbi2-bg);color:var(--jbi2-fg);}

.lotes-list{display:flex;flex-direction:column;gap:8px;}
.lote-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);padding:6px 10px;border-radius:4px;border:1px solid var(--border);}
.lote-name{font-family:var(--mono);font-size:13px;}

/* Checkbox estilizado */
.cb-container{display:block;position:relative;padding-left:24px;cursor:pointer;font-size:14px;user-select:none;}
.cb-container input{position:absolute;opacity:0;cursor:pointer;height:0;width:0;}
.checkmark{position:absolute;top:2px;left:0;height:16px;width:16px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;}
.cb-container:hover input ~ .checkmark{border-color:var(--text2);}
.cb-container input:checked ~ .checkmark{background:var(--accent);border-color:var(--accent);}
.checkmark:after{content:"";position:absolute;display:none;}
.cb-container input:checked ~ .checkmark:after{display:block;}
.cb-container .checkmark:after{left:5px;top:2px;width:4px;height:8px;border:solid #000;border-width:0 2px 2px 0;transform:rotate(45deg);}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.summary-card{background:var(--surface2);border:1px solid var(--border);padding:16px;border-radius:var(--radius);}
.summary-val{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--accent);margin-top:4px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);padding:12px 24px;border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.6);display:none;align-items:center;gap:12px;z-index:10000;font-size:14px;}

.admin-only { display: none; background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); margin-top: auto; }
.btn-add { background: var(--surface2); color: var(--accent); border: 1px dashed var(--accent); padding: 10px; border-radius: var(--radius); cursor: pointer; text-align: center; font-weight: 500; font-size: 13px; width: 100%; margin-top: 5px; }
.btn-add:hover { background: #c8f13511; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
