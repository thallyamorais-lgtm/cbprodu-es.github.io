<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma Controle de Produções — CB Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* 🖤 PALETA PRETO, BRANCO E TONS DE CINZA */
  --bg: #0a0a0a;
  --surface: #121212;
  --surface2: #1c1c1c;
  --border: #2d2d2d;
  --border2: #404040;
  --accent: #ffffff;          
  --accent-light: #e0e0e0;    
  --text: #f5f5f5;
  --text2: #a0a0a0;
  --text3: #666666;
  --danger: #ffffff;          
  --jbi-fg: #ffffff;
  --jbi2-fg: #ffffff;
  --radius: 6px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

/* 🌪️ TELA DE LOGIN COM FUNDO HIPER DINÂMICO E COM MUITO DESTAQUE */
.login-screen {
  position: fixed;
  inset: 0;
  background: #000000;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* Camada 1: Efeito de Túnel de Velocidade / Linhas Cônicas Explosivas */
.login-screen::before {
  content: '';
  position: absolute;
  width: 300vw;
  height: 300vh;
  top: -100vh;
  left: -100vw;
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(255, 255, 255, 0.15) 5%,
    transparent 10%,
    transparent 30%,
    rgba(255, 255, 255, 0.2) 35%,
    transparent 40%,
    transparent 60%,
    rgba(255, 255, 255, 0.25) 65%,
    transparent 70%,
    transparent 85%,
    rgba(255, 255, 255, 0.15) 90%,
    transparent 100%
  );
  animation: tunnelRotation 12s linear infinite;
  transform-origin: center center;
}

/* Camada 2: Segunda camada cruzada para dar profundidade e brilho */
.login-screen::after {
  content: '';
  position: absolute;
  width: 250vw;
  height: 250vh;
  top: -75vh;
  left: -75vw;
  background: repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 30px,
    rgba(255, 255, 255, 0.04) 31px,
    rgba(255, 255, 255, 0.04) 40px
  );
  animation: pulseExplosion 4s ease-in-out infinite alternate;
  transform-origin: center center;
}

@keyframes tunnelRotation {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}

@keyframes pulseExplosion {
  0% { transform: scale(0.9); opacity: 0.5; }
  100% { transform: scale(1.2); opacity: 1; }
}

/* Brilho Central atrás da Caixa de Login */
.login-glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  z-index: 2;
  pointer-events: none;
}

.login-box {
  position: relative;
  background: #ffffff;
  color: #121212;
  padding: 40px 35px;
  border-radius: 8px;
  width: 100%;
  max-width: 440px;
  text-align: center;
  box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 255, 255, 0.1);
  z-index: 10;
}
.login-box .logo-img {
  max-width: 180px;
  margin-bottom: 20px;
  display: inline-block;
}
.login-box h2 {
  font-size: 19px;
  font-weight: 600;
  color: #000000;
  letter-spacing: 0.5px;
}
.login-box p {
  color: #666666;
  font-size: 13px;
  margin-bottom: 25px;
}
.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { display: block; color: #333333; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
.input-group input {
  width: 100%;
  padding: 12px;
  background: #f5f5f5;
  border: 1px solid #cccccc;
  color: #000000;
  border-radius: var(--radius);
  font-size: 14px;
  transition: all 0.2s;
}
.input-group input:focus { outline: none; border-color: #000000; background: #fff; }
.btn-login {
  background: #000000;
  color: #ffffff;
  padding: 14px;
  border: none;
  width: 100%;
  border-radius: var(--radius);
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  transition: background 0.2s;
}
.btn-login:hover { background: #222222; }

/* 🏢 INTERFACE DO PAINEL PRINCIPAL */
.sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; }
.sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.sidebar-header .logo-panel { max-width: 150px; display: inline-block; }
.sidebar-title-section { background: #161616; padding: 10px 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }

.menu-frentes { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.menu-btn-container { display: flex; flex-direction: column; background: transparent; padding: 10px 14px; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
.menu-frentes .menu-btn-container:hover { background: var(--surface2); border-color: var(--border); }
.menu-frentes .menu-btn-container.active { background: var(--surface2); border-color: var(--border2); border-left: 4px solid var(--accent); }

.menu-btn-header { display: flex; justify-content: space-between; align-items: center; width: 100%; font-size: 13px; color: var(--text); font-weight: 500; margin-bottom: 6px; }
.menu-progress-bg { width: 100%; height: 4px; background: #000000; border-radius: 2px; overflow: hidden; }
.menu-progress-bar { height: 100%; background: #ffffff; border-radius: 2px; transition: width 0.3s; }

/* CONTEÚDO */
.main-content { flex: 1; padding: 25px; overflow-y: auto; height: 100vh; }
.nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); padding: 15px 20px; border-radius: var(--radius); margin-bottom: 25px; }
.nav-actions { display: flex; align-items: center; gap: 12px; }

/* BOTÕES ESTILO PRETO E BRANCO */
.btn-web { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 18px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
.btn-web:hover { background: #262626; border-color: var(--border2); }
.btn-web-primary { background: #ffffff; border: 1px solid #ffffff; color: #000000; font-weight: 600; }
.btn-web-primary:hover { background: #e0e0e0; border-color: #e0e0e0; }
.btn-home { background: var(--surface2); border: 1px solid var(--border); padding: 8px 12px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.btn-home:hover { background: #262626; }
.btn-home svg { width: 18px; height: 18px; fill: var(--text); }

/* QUADRAS E CASAS */
.grid-quadras { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
.quadra-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.quadra-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-weight: 600; font-size: 14px; letter-spacing: 0.3px; }
.condo-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); }

.lotes-list { display: flex; flex-direction: column; gap: 10px; }
.lote-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); }
.lote-info { display: flex; flex-direction: column; gap: 2px; }
.lote-title { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.lote-team-label { font-size: 11px; color: var(--text2); }

/* BOTÃO DA CASA DIRETÃO */
.btn-casa-lote { background: #121212; border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.15s; }
.btn-casa-lote:hover { background: #262626; border-color: var(--border2); }
.btn-casa-lote.active { background: #ffffff; border-color: #ffffff; }
.btn-casa-lote svg { width: 16px; height: 16px; fill: var(--text2); transition: 0.15s; }
.btn-casa-lote.active svg { fill: #000000; }

.status-pill { background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: var(--radius); font-size: 12px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; color: var(--text2); }
.indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.indicator.online { background: #ffffff; box-shadow: 0 0 8px #ffffff; }
.indicator.offline { background: #404040; }

.admin-only { display: none; padding: 15px; border-top: 1px solid var(--border); background: var(--surface2); }
.toast { position: fixed; bottom: 24px; right: 24px; background: #ffffff; color: #000000; padding: 12px 24px; border-radius: var(--radius); display: none; z-index: 10000; font-size: 14px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-glow"></div>
  <div class="login-box">
    <img src="logo.png" class="logo-img" id="img-login-logo" alt="CB Engenharia" onerror="this.src='https://placehold.co/180x60/000000/white?text=CB+ENGENHARIA'">
    <h2>Login Obrigatório —</h2>
    <p>Plataforma Integrada de Obras</p>
    
    <div class="input-group">
      <label>Login</label>
      <input type="email" id="email" placeholder="maria.souza@cbengenharia.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    
    <button class="btn-login" onclick="fazerLogin()">Acessar Painel</button>
    <p id="erroLogin" style="color:red; margin-top:15px; font-size:13px; font-weight:500;"></p>
  </div>
</div>

<div class="sidebar" id="appSidebar" style="display:none;">
  <div class="sidebar-header">
    <img src="logo.png" class="logo-panel" id="img-sidebar-logo" alt="CB Engenharia" onerror="this.src='https://placehold.co/140x45/000000/white?text=CB+ENGENHARIA'">
  </div>
  
  <div class="sidebar-title-section">Serviços fronts</div>
  
  <div class="menu-frentes" id="menuFrentes">
    </div>

  <div class="admin-only" id="adminSection">
    <button class="btn-web" onclick="criarNovaFrentePelaTela()" style="width:100%; justify-content:center; border: 1px dashed #fff;">➕ Nova Frente</button>
  </div>
</div>

<div class="main-content" id="appMain" style="display:none;">
  <div class="nav-header">
    <div>
      <h2 style="font-size:20px; font-weight:600; color:#fff;" id="txt-dashboard-title">Dashboard</h2>
      <p style="font-size:12px; color:var(--text2); margin-top:2px;">Frente ativa: <span id="tituloFrenteAtiva" style="color:#ffffff; font-weight:600; text-decoration: underline;">Nenhuma</span></p>
    </div>
    
    <div class="nav-actions">
      <button class="btn-home" onclick="voltarParaHome()" title="Home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <button class="btn-web" onclick="fazerLogout()">Logar / Sair</button>
      <button class="btn-web btn-web-primary" onclick="forcarSalvarTudo()">Salvar</button>
      <button class="btn-home" onclick="voltarParaHome()">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
    </div>
  </div>

  <div class="status-pill">
    <div class="indicator" id="ind-server"></div>
    <span id="txt-server">Buscando API...</span>
  </div>

  <div id="conteudoDoApp" style="display:none;">
    <div class="grid-quadras" id="quadras-container"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAopowEma-grqzHvcRIantOiib8mcegZAc",
  authDomain: "cb-producoes.firebaseapp.com",
  projectId: "cb-producoes",
  storageBucket: "cb-producoes.firebasestorage.app",
  messagingSenderId: "680753223608",
  appId: "1:680753223608:web:764354d726cddb90f2214d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const SERVER = 'http://localhost:5000';
const emailDoAdmin = "seu-email-adm@empresa.com";

const QUADRAS_CONFIG = [
  {id:'Q1',nome:'Quadra 01',condo:'jbi',lotes:14}, {id:'Q2',nome:'Quadra 02',condo:'jbi',lotes:18},
  {id:'Q3',nome:'Quadra 03',condo:'jbi',lotes:20}, {id:'Q4',nome:'Quadra 04',condo:'jbi',lotes:12},
  {id:'Q5',nome:'Quadra 05',condo:'jbi2',lotes:16}, {id:'Q6',nome:'Quadra 06',condo:'jbi2',lotes:22}
];

let listaFrentes = JSON.parse(localStorage.getItem('cb_lista_frentes')) || [
  { id: "contencao", nome: "Contenção", progresso: 78 },
  { id: "cabeamento", nome: "Cabeamento", progresso: 66 },
  { id: "acabamento", nome: "Acabamento", progresso: 78 },
  { id: "instalacoes_radier", nome: "Instalações de Radier", progresso: 36 },
  { id: "paredes", nome: "Paredes", progresso: 96 },
  { id: "instalacao_registros", nome: "Instalação de Registros", progresso: 78 },
  { id: "graute_inferior", nome: "Graute Inferior", progresso: 78 },
  { id: "lajes_empenas", nome: "Lajes e Empenas", progresso: 78 },
  { id: "telhado", nome: "Telhado", progresso: 86 },
  { id: "hidrossanitarias", nome: "Instalações Hidrossanitárias", progresso: 78 },
  { id: "gesso", nome: "Gesso", progresso: 78 },
  { id: "contrapiso", nome: "Contrapiso", progresso: 66 },
  { id: "caixinha", nome: "Caixinha", progresso: 78 },
  { id: "peitoril", nome: "Peitoril", progresso: 36 },
  { id: "esquadrias", nome: "Esquadrias", progresso: 96 },
  { id: "impermeabilizacao", nome: "Impermeabilização", progresso: 78 },
  { id: "ceramica", nome: "Cerâmica", progresso: 78 }
];

let servicoAtivoId = '';
let livro = [];

function renderizarMenuLateral() {
  const container = document.getElementById('menuFrentes');
  container.innerHTML = "";
  listaFrentes.forEach(frente => {
    const wrapper = document.createElement('div');
    wrapper.className = "menu-btn-container";
    wrapper.id = "frente-" + frente.id;
    wrapper.onclick = () => alternarFrenteDeServico(frente.id, frente.nome);

    wrapper.innerHTML = `
      <div class="menu-btn-header">
        <span>${frente.nome}</span>
        <span style="font-size:11px; color:var(--text2); font-family:var(--mono);">${frente.progresso}%</span>
      </div>
      <div class="menu-progress-bg">
        <div class="menu-progress-bar" style="width: ${frente.progresso}%"></div>
      </div>
    `;
    container.appendChild(wrapper);
  });
}

async function alternarFrenteDeServico(id, nome) {
  servicoAtivoId = id;
  document.querySelectorAll('.menu-btn-container').forEach(b => b.classList.remove('active'));
  document.getElementById("frente-" + id).classList.add('active');
  
  document.getElementById('tituloFrenteAtiva').innerText = nome;
  document.getElementById('conteudoDoApp').style.display = 'block';

  await carregarEstadoDaNuvem();
  renderizarQuadras();
}

async function carregarEstadoDaNuvem(){
  try {
    const r = await fetch(`${SERVER}/carregar-estado?servico=${servicoAtivoId}`, {signal: AbortSignal.timeout(2000)});
    if(r.ok){
      const d = await r.json();
      if(d && d.livro){ livro = d.livro; setServerStatus(true); return; }
    }
  } catch(e){}
  
  setServerStatus(false);
  const local = localStorage.getItem('cb_estado_' + servicoAtivoId);
  if(local) {
    const d = JSON.parse(local);
    if(d && d.livro) { livro = d.livro; return; }
  }
  livro = [{ id: '2026-06', status: 'open', mappedLotes: {} }];
}

function renderizarQuadras() {
  const container = document.getElementById('quadras-container');
  container.innerHTML = "";
  const data = livro[0] || { mappedLotes: {} };

  QUADRAS_CONFIG.forEach(q => {
    const divQ = document.createElement('div');
    divQ.className = "quadra-box";
    divQ.innerHTML = `
      <div class="quadra-header">
        <span>${q.nome}</span>
        <span class="condo-tag">${q.condo.toUpperCase()}</span>
      </div>
      <div class="lotes-list" id="lotes-${q.id}"></div>
    `;
    container.appendChild(divQ);

    const listCont = document.getElementById(`lotes-${q.id}`);
    for(let i = 1; i <= q.lotes; i++) {
      const loteKey = `${q.id}-L${String(i).padStart(2,'0')}`;
      const isActive = data.mappedLotes && data.mappedLotes[loteKey];

      const row = document.createElement('div');
      row.className = "lote-item";
      row.innerHTML = `
        <div class="lote-info">
          <span class="lote-title">Lote ${String(i).padStart(2,'0')}</span>
          <span class="lote-team-label">${isActive ? 'Marcado / Concluído' : 'Pendente'}</span>
        </div>
        <button class="btn-casa-lote ${isActive ? 'active' : ''}" onclick="cliqueBotaoCasa('${loteKey}')">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
      `;
      listCont.appendChild(row);
    }
  });
}

function cliqueBotaoCasa(loteKey) {
  if(!livro[0].mappedLotes) livro[0].mappedLotes = {};
  
  if(livro[0].mappedLotes[loteKey]) {
    delete livro[0].mappedLotes[loteKey];
  } else {
    livro[0].mappedLotes[loteKey] = true;
  }
  
  atualizarProgressoFrenteAtual();
  renderizarQuadras();
  salvarBackupLocal();
}

function atualizarProgressoFrenteAtual() {
  const f = listaFrentes.find(frente => frente.id === servicoAtivoId);
  if(f) {
    let totalLotesGeral = 102;
    let marcados = Object.keys(livro[0].mappedLotes || {}).length;
    f.progresso = Math.round((marcados / totalLotesGeral) * 100) || 0;
    localStorage.setItem('cb_lista_frentes', JSON.stringify(listaFrentes));
    renderizarMenuLateral();
    document.getElementById("frente-" + servicoAtivoId).classList.add('active');
  }
}

function salvarBackupLocal() {
  localStorage.setItem('cb_estado_' + servicoAtivoId, JSON.stringify({ livro }));
}

async function forcarSalvarTudo() {
  salvarBackupLocal();
  try {
    const r = await fetch(`${SERVER}/salvar-estado?servico=${servicoAtivoId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ livro })
    });
    if(r.ok) { setServerStatus(true); showToast("Sincronizado na nuvem!"); return; }
  } catch(e){}
  setServerStatus(false);
  showToast("Salvo localmente");
}

function voltarParaHome() {
  document.getElementById('conteudoDoApp').style.display = 'none';
  document.getElementById('tituloFrenteAtiva').innerText = "Nenhuma";
  document.querySelectorAll('.menu-btn-container').forEach(b => b.classList.remove('active'));
}

function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('erroLogin').innerText = "";

  if(!email || !password) {
    document.getElementById('erroLogin').innerText = "Preencha todos os campos.";
    return;
  }

  auth.signInWithEmailAndPassword(email, password).catch(e => {
    document.getElementById('erroLogin').innerText = "Erro: Acesso negado.";
  });
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appSidebar').style.display = 'flex';
    document.getElementById('appMain').style.display = 'block';
    renderizarMenuLateral();
    if (user.email === emailDoAdmin) document.getElementById('adminSection').style.display = 'block';
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appSidebar').style.display = 'none';
    document.getElementById('appMain').style.display = 'none';
  }
});

function fazerLogout() { auth.signOut(); }
function setServerStatus(o){
  const ind = document.getElementById('ind-server');
  const txt = document.getElementById('txt-server');
  ind.className = "indicator " + (o ? "online" : "offline");
  txt.innerText = o ? "Configurações Carregadas — API Conectada." : "Servidor Local Offline.";
}
function showToast(m){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').innerText = m;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
